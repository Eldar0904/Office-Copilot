<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Employee Copilot</title>
<meta name="description" content="Your daily work hub — tasks, weekly planner, and team messages in one place.">

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b5389">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Copilot">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png" sizes="192x192">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

  <!-- status-bar safe-area spacer (color follows active tab) -->
  <div id="statusSpacer" class="status-spacer"></div>

  <!-- ══════════════════ MAIN (non-chat) SCREENS ══════════════════ -->
  <main id="mainScreens">

    <!-- ── TODAY ── -->
    <section id="screen-today" class="screen">
      <div id="todayHero"></div>
      <div class="screen-scroll" id="todayTaskList"></div>
    </section>

    <!-- ── WEEK ── -->
    <section id="screen-week" class="screen hidden">
      <header class="screen-header">
        <div class="header-date" id="weekRangeLabel"></div>
        <div class="header-title">Weekly Planner</div>
        <div class="day-pills" id="dayPills"></div>
        <div class="week-progress">
          <div class="week-progress-row">
            <div class="week-progress-label" id="selectedDayLabel"></div>
            <div class="week-progress-count" id="weekDayCount"></div>
          </div>
          <div class="progress-track"><div class="progress-fill" id="weekProgressFill"></div></div>
        </div>
      </header>
      <div class="screen-scroll" id="weekTaskList"></div>
    </section>

    <!-- ── MESSAGES ── -->
    <section id="screen-messages" class="screen hidden">
      <header class="screen-header">
        <div class="header-title" style="margin-top:2px;">Messages</div>
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#a6a6a6" stroke-width="1.6"/><path d="M9.5 9.5L12.5 12.5" stroke="#a6a6a6" stroke-width="1.6" stroke-linecap="round"/></svg>
          <span>Search messages</span>
        </div>
      </header>
      <div class="screen-scroll" style="padding:0 20px 84px;">
        <div style="padding-top:14px;">
          <div class="list-label">Channels</div>
          <div id="channelList"></div>
          <div class="add-channel-row" data-action="openCreateChannel">
            <div class="add-channel-icon">+</div>
            <div class="add-channel-label">Add a channel</div>
          </div>
        </div>
        <div style="padding-top:20px;">
          <div class="list-label">Direct Messages</div>
          <div id="dmList"></div>
        </div>
      </div>
    </section>

    <!-- ── ME ── -->
    <section id="screen-me" class="screen hidden">
      <div class="screen-scroll" style="padding-bottom:84px;">
        <div class="profile-hero">
          <div class="profile-avatar">SA</div>
          <div class="profile-name">Sara Ahmed</div>
          <div class="profile-role">Product Manager · PMO</div>
          <div class="profile-status"><span class="status-dot"></span>Available</div>
        </div>
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value" id="statDone" style="color:#0b5389;"></div>
            <div class="stat-label">Done today</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statPending" style="color:#c97559;"></div>
            <div class="stat-label">Pending</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statWeek" style="color:#34c759;"></div>
            <div class="stat-label">This week</div>
          </div>
        </div>
        <div class="settings-list" id="settingsList"></div>
        <div id="langSwitcherPwa" style="padding: 12px 16px 0;"></div>
      </div>
    </section>

  </main>

  <!-- ══════════════════ CHAT SCREEN ══════════════════ -->
  <div id="screen-chat" class="screen chat-screen hidden">
    <div class="chat-navbar">
      <div class="icon-btn" data-action="closeChat">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none"><path d="M8 1L1 7.5L8 14" stroke="#0b5389" stroke-width="2.5" stroke-linecap="round"/></svg>
      </div>
      <div class="chat-avatar" id="chatAvatar"></div>
      <div class="chat-title-wrap">
        <div class="chat-title" id="chatTitle"></div>
        <div class="chat-subtitle" id="chatSubtitle"></div>
      </div>
      <!-- Notification bell -->
      <div class="icon-btn notif-bell-btn-pwa" data-action="toggleNotifPanelPwa" style="position:relative;">
        <svg width="18" height="18" viewBox="0 0 22 22" fill="none"><path d="M11 2a7 7 0 00-7 7v4l-1.5 2.5h17L18 13V9a7 7 0 00-7-7z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 18a2 2 0 004 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span class="notif-badge-pwa hidden" id="notifBadgePwa">0</span>
      </div>
      <!-- AI Agent button -->
      <div class="icon-btn" data-action="openAgentPanel" title="AI Agent">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="12" rx="3" stroke="#0b5389" stroke-width="2"/><path d="M5 10a7 7 0 0014 0" stroke="#0b5389" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="#0b5389" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </div>
    <!-- File preview strip -->
    <div class="pwa-file-strip hidden" id="pwaFileStrip"></div>
    <div class="chat-messages" id="chatMessages"></div>
    <!-- Context menu (long-press edit/delete) -->
    <div class="msg-ctx-menu hidden" id="msgCtxMenu">
      <button class="msg-ctx-btn" data-action="ctxEdit">✏️ Edit</button>
      <button class="msg-ctx-btn msg-ctx-del" data-action="ctxDelete">🗑️ Delete</button>
      <button class="msg-ctx-btn" data-action="ctxReply">↩ Reply in thread</button>
    </div>
    <div class="chat-input-bar" id="chatInputBar">
      <label class="chat-attach-btn" title="Attach file">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l8.57-8.57A4 4 0 1117.99 9l-8.58 8.57a2 2 0 01-2.83-2.83l8.49-8.48" stroke="#8a9bb0" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="file" id="chatFileInput" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" style="display:none;">
      </label>
      <textarea id="chatInput" class="chat-input-real" placeholder="Type a message…" rows="1"></textarea>
      <button class="send-btn" data-action="sendChatMsg">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8H14M14 8L9 3M14 8L9 13" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- ══════════════════ BOTTOM TAB BAR ══════════════════ -->
  <nav class="tabbar" id="tabbar">
    <div class="tab-item" data-action="selectTab" data-tab="today">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" class="tab-icon" data-tab-icon="today">
        <rect x="2" y="3" width="18" height="16" rx="3" stroke-width="1.9"/>
        <path d="M7 1.5V4.5M15 1.5V4.5" stroke-width="1.9" stroke-linecap="round"/>
        <path d="M6 11H11M6 15H9" stroke-width="1.9" stroke-linecap="round"/>
        <circle cx="16" cy="15" r="2.5" data-today-dot stroke-width="1.5"/>
      </svg>
      <div class="tab-label" data-tab-label="today">Today</div>
    </div>
    <div class="tab-item" data-action="selectTab" data-tab="week">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" class="tab-icon" data-tab-icon="week">
        <rect x="2" y="3" width="18" height="16" rx="3" stroke-width="1.9"/>
        <path d="M7 1.5V4.5M15 1.5V4.5" stroke-width="1.9" stroke-linecap="round"/>
        <path d="M6 10H16M6 14H12" stroke-width="1.9" stroke-linecap="round"/>
      </svg>
      <div class="tab-label" data-tab-label="week">Week</div>
    </div>
    <div class="tab-item" data-action="selectTab" data-tab="messages" style="position:relative;">
      <div class="unread-dot hidden" id="unreadDot"></div>
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" class="tab-icon" data-tab-icon="messages">
        <path d="M20 13a2 2 0 01-2 2H6l-4 4V4a2 2 0 012-2h14a2 2 0 012 2v9z" stroke-width="1.9" stroke-linejoin="round"/>
      </svg>
      <div class="tab-label" data-tab-label="messages">Messages</div>
    </div>
    <div class="tab-item" data-action="selectTab" data-tab="me">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" class="tab-icon" data-tab-icon="me">
        <circle cx="11" cy="7" r="3.5" stroke-width="1.9"/>
        <path d="M3 20c0-4 3.582-7 8-7s8 3 8 7" stroke-width="1.9" e-linecap="round"/>
      </svg>
      <div class="tab-label" data-tab-label="me">Me</div>
    </div>
  </nav>

</div>

<!-- ══════════════════ TASK DETAIL SHEET ══════════════════ -->
<div id="taskDetailOverlay" class="sheet-overlay hidden" data-action="closeTaskDetail">
  <div class="sheet" data-stop>
    <div class="sheet-handle"></div>
    <div class="sheet-priority-bar" id="td-priorityBar"></div>
    <div class="sheet-title" id="td-title"></div>
    <div class="sheet-tags">
      <div class="tag tag-dept" id="td-dept"></div>
      <div class="tag tag-neutral" id="td-due"></div>
      <div class="tag" id="td-priority"></div>
    </div>
    <div class="sheet-actions">
      <div class="btn-primary" id="td-toggleBtn" data-action="toggleActiveTask"></div>
      <div class="btn-icon" data-action="closeTaskDetail">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2L12 12M12 2L2 12" stroke="#4f5158" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════ ADD TASK SHEET ══════════════════ -->
<div id="addTaskOverlay" class="sheet-overlay hidden" data-action="closeAddSheet">
  <div class="sheet" data-stop>
    <div class="sheet-handle"></div>
    <div class="sheet-title" style="margin-bottom:14px;">New Task</div>
    <input id="newTaskInput" class="task-input" placeholder="What needs to be done?" autocomplete="off">
    <div class="sheet-actions">
      <div class="btn-primary" data-action="addTask">Add Task</div>
      <div class="btn-icon" data-action="closeAddSheet">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2L12 12M12 2L2 12" stroke="#4f5158" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════ CREATE CHANNEL SHEET ══════════════════ -->
<div id="createChannelOverlay" class="sheet-overlay hidden" data-action="closeCreateChannel">
  <div class="sheet" data-stop>
    <div class="sheet-handle"></div>
    <div class="sheet-title" style="margin-bottom:14px;">New Channel</div>
    <input id="newChannelName" class="task-input" placeholder="Channel name (e.g. design-team)" autocomplete="off" maxlength="40">
    <input id="newChannelEmoji" class="task-input" placeholder="Emoji (optional, e.g. &#x1F3A8;)" style="margin-top:10px;" maxlength="4">
    <div class="sheet-actions" style="margin-top:16px;">
      <div class="btn-primary" data-action="submitCreateChannel">Create</div>
      <div class="btn-icon" data-action="closeCreateChannel">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2L12 12M12 2L2 12" stroke="#4f5158" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════ THREAD SHEET ══════════════════ -->
<div id="threadOverlay" class="sheet-overlay hidden">
  <div class="sheet thread-sheet" data-stop>
    <div class="sheet-handle"></div>
    <div class="thread-sheet-head">
      <span class="thread-sheet-title">Thread</span>
      <button class="icon-btn" data-action="closeThread">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 2L12 12M12 2L2 12" stroke="#4f5158" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="thread-original-msg" id="threadOriginalPwa"></div>
    <div class="thread-reply-list" id="threadRepliesPwa"></div>
    <div class="thread-composer-pwa">
      <textarea id="threadInputPwa" class="chat-input-real" placeholder="Reply in thread..." rows="1"></textarea>
      <button class="send-btn" data-action="sendThreadReplyPwa">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8H14M14 8L9 3M14 8L9 13" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════ VOICE AGENT SHEET ══════════════════ -->
<div id="agentPanelOverlay" class="sheet-overlay hidden">
  <div class="sheet agent-sheet" data-stop>
    <div class="sheet-handle"></div>
    <div class="agent-sheet-head">
      <span class="agent-sheet-title">&#x1F916; AI Copilot</span>
      <button class="icon-btn" data-action="closeAgentPanel">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 2L12 12M12 2L2 12" stroke="#4f5158" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="agent-msgs-pwa" id="agentMsgsPwa"></div>
    <div class="agent-thinking-pwa hidden" id="agentThinkingPwa">
      <span>&#9679;</span><span style="animation:fadeIn .5s .2s both">&#9679;</span><span style="animation:fadeIn .5s .4s both">&#9679;</span>
    </div>
    <div class="agent-orb-pwa" id="agentOrbPwa" data-action="toggleAgentMicPwa">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="9" y="2" width="6" height="12" rx="3" stroke="white" stroke-width="2"/>
        <path d="M5 10a7 7 0 0014 0" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="19" x2="12" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="agent-status-pwa" id="agentStatusPwa">Tap to speak</div>
    <div class="agent-text-row-pwa">
      <input id="agentInputPwa" class="agent-input-pwa" type="text" placeholder="Or type a request..." autocomplete="off">
      <button class="send-btn" data-action="sendAgentTextPwa">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 8H14M14 8L9 3M14 8L9 13" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════ NOTIFICATION SHEET ══════════════════ -->
<div id="notifOverlayPwa" class="sheet-overlay hidden">
  <div class="sheet" data-stop>
    <div class="sheet-handle"></div>
    <div class="thread-sheet-head">
      <span class="thread-sheet-title">Notifications</span>
      <button class="icon-btn" data-action="closeNotifPanelPwa">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 2L12 12M12 2L2 12" stroke="#4f5158" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="notifListPwa" style="max-height:50vh;overflow-y:auto;"></div>
    <div style="padding:14px 0 0;">
      <button class="btn-primary" data-action="clearNotifsPwa" style="font-size:13px;width:100%;">Clear all</button>
    </div>
  </div>
</div>

<!-- ══════════════════ IMAGE LIGHTBOX ══════════════════ -->
<div id="pwaLightbox" class="pwa-lightbox hidden" data-action="closeLightbox">
  <img id="pwaLightboxImg" src="" alt="">
</div>

<script src="../shared/data.js"></script>
<script src="../shared/i18n.js"></script>
<script src="app.js"></script>
</body>
</html>

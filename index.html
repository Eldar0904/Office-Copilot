<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee Copilot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .hub { text-align: center; padding: 40px 24px; }
  .logo { width: 64px; height: 64px; background: linear-gradient(135deg, #0b5389, #4f6ef7); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: #fff; margin: 0 auto 20px; letter-spacing: -1px; }
  h1 { font-size: 26px; font-weight: 800; color: #1a2233; margin-bottom: 6px; }
  p  { font-size: 15px; color: #8a9bb0; margin-bottom: 36px; }
  .cards { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .card {
    display: block; text-decoration: none;
    width: 200px; padding: 24px 20px;
    background: #fff; border-radius: 16px;
    border: 1.5px solid #e8edf5;
    box-shadow: 0 2px 12px rgba(11,83,137,.08);
    transition: transform .15s, box-shadow .15s;
    color: #1a2233;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(11,83,137,.14); }
  .card-icon { font-size: 36px; margin-bottom: 12px; }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .card-sub   { font-size: 12px; color: #8a9bb0; }
  .badge { display: inline-block; margin-top: 10px; font-size: 10px; font-weight: 700; background: #e8f0fe; color: #0b5389; border-radius: 6px; padding: 2px 7px; letter-spacing: .04em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="hub">
  <div class="logo">EC</div>
  <h1>Employee Copilot</h1>
  <p>Choose your experience</p>
  <div class="cards">
    <a class="card" href="/web">
      <div class="card-icon">🖥️</div>
      <div class="card-title">Web App</div>
      <div class="card-sub">Full Slack-style desktop experience</div>
      <span class="badge">Desktop</span>
    </a>
    <a class="card" href="/pwa">
      <div class="card-icon">📱</div>
      <div class="card-title">Mobile PWA</div>
      <div class="card-sub">iOS &amp; Android — add to Home Screen</div>
      <span class="badge">Mobile</span>
    </a>
  </div>
</div>
</body>
</html>
